<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PHOTO GROOVE</title>
    <link rel="stylesheet" href="./style.css" />
</head>

<body>

    <!-- 1페이지 -->
    <section id="page1" class="page page-main">
        <div class="main-wrap">
            <h1>Record yourself</h1>

            <div class="main-menu">
                <span>전국 최저가</span>
                <em>|</em>
                <span>포토키오스크 제작</span>
                <em>|</em>
                <span>포토키오스크 렌탈</span>
                <em>|</em>
                <span>포토프로그램 설치</span>
            </div>

            <button class="start-btn" onclick="goPage2()">→ 최저가 알아보기</button>
        </div>

        <div class="bottom-logo">
            <img src="./assets/images/pg-logo.png" alt="photo groove" />
        </div>
    </section>

    <!-- 2페이지 -->
    <section id="page2" class="page hidden">
        <div class="design-frame">
            <div class="mobile-wrap">

                <img src="./assets/images/pg-logo.png" class="top-logo" onclick="goPage1()" />

                <div class="info">
                    <p class="address">대전광역시 중구 은행동 33-4, 2층</p>

                    <div class="contact">
                        <p>+ <a href="tel:01034081864">전화하기 (Mobile only)</a></p>
                        <p>+ <a href="mailto:kakao.com@gmail.com">이메일 보내기</a></p>
                        <p>+ <a href="https://www.instagram.com/photogroove_official" target="_blank">인스타그램</a></p>
                        <p>+ <a href="https://blog.naver.com/kokokooki" target="_blank">네이버 블로그</a></p>
                    </div>
                </div>

                <a href="http://pf.kakao.com/_zRMZj/chat" target="_blank" class="kakao-btn yellow">
                    카카오톡 문의
                </a>

                <div class="line"></div>

                <div class="total-box">
                    <span>원하는 사항에 체크하시고 비용을 확인해 보세요</span>

                    <div class="total">
                        <strong>총 비용</strong>
                        <strong id="totalPrice">0원</strong>
                    </div>
                </div>

                <div class="line"></div>

                <div class="options">

                    <!-- 🔥 그룹1 -->
                    <div class="option-group">
                        <button class="group-title" type="button">키오스크 렌탈 <span>∨</span></button>

                        <div class="sub-options">
                            <label>
                                <span>4시간 렌탈</span>
                                <input type="checkbox" class="price-check" data-price="198000" />
                            </label>

                            <label>
                                <span>1일 렌탈</span>
                                <input type="checkbox" class="price-check" data-price="700000" />
                            </label>

                            <label>
                                <span>인화지 1,000장 추가 (기본 300장 제공)</span>
                                <input type="checkbox" class="price-check" data-price="200000" />
                            </label>

                            <label>
                                <span>직접 수령 / 직접 반납 (아반떼 뒷좌석에 실립니다)</span>
                                <input type="checkbox" class="price-check" data-price="0" />
                            </label>

                            <label>
                                <span>왕복 운송 및 설치 요청</span>
                                <input type="checkbox" class="price-check" data-price="200000" />
                            </label>

                            <label>
                                <span>포토월 + 포토배경</span>
                                <input type="checkbox" class="price-check" data-price="250000" />
                            </label>

                            <label>
                                <span>현장 직원</span>
                                <input type="checkbox" class="price-check" data-price="200000" />
                            </label>
                        </div>
                    </div>

                    <!-- 🔥 그룹2 -->
                    <div class="option-group">
                        <button class="group-title" type="button">프로그램 + 키오스크 제작 <span>∨</span></button>

                        <div class="sub-options">
                            <label>
                                <span>스탠드형 1500 (렌탈형)</span>
                                <input type="checkbox" class="price-check" data-price="5000000" />
                            </label>

                            <label>
                                <span>스탠드형 1900 (매장형)</span>
                                <input type="checkbox" class="price-check" data-price="6000000" />
                            </label>

                            <label>
                                <span>키오스크 + 포토부스 일체형</span>
                                <input type="checkbox" class="price-check" data-price="0" />
                            </label>

                            <label>
                                <span>인테리어 매립형</span>
                                <input type="checkbox" class="price-check" data-price="0" />
                            </label>

                            <label>
                                <span>디자인 커스텀</span>
                                <input type="checkbox" class="price-check" data-price="0" />
                            </label>
                        </div>
                    </div>

                    <!-- 🔥 그룹3 -->
                    <div class="option-group">
                        <button class="group-title" type="button">프로그램만 설치 <span>∨</span></button>

                        <div class="sub-options">
                            <label>
                                <span>연간 이용료 (1-5대)</span>
                                <input type="checkbox" class="price-check" data-price="398000" />
                            </label>

                            <label>
                                <span>카드 리더기 (1대)</span>
                                <input type="checkbox" class="price-check" data-price="66000" />
                            </label>

                            <label>
                                <span>자가 설치</span>
                                <input type="checkbox" class="price-check" data-price="0" />
                            </label>

                            <label>
                                <span>원격 설치 (1대당)</span>
                                <input type="checkbox" class="price-check" data-price="200000" />
                            </label>

                            <label>
                                <span>현장 설치 (1-5대)</span>
                                <input type="checkbox" class="price-check" data-price="1000000" />
                            </label>

                            <label>
                                <span>내 브랜드 프로그램 제작</span>
                                <input type="checkbox" class="price-check" data-price="1000000" />
                            </label>

                            <label>
                                <span>가맹사업 가능한 프로그램 제작</span>
                                <input type="checkbox" class="price-check" data-price="1000000" />
                            </label>
                        </div>
                    </div>

                </div>

            </div>
        </div>
    </section>

    <script src="./script.js"></script>
</body>

</html>
